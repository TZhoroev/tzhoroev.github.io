name: Update Publications from Google Scholar

on:
  schedule:
    # Runs every 2 weeks on Sunday at midnight UTC
    - cron: '0 0 1,15 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-publications:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install scholarly requests

      - name: Fetch publications from Google Scholar
        run: python scripts/fetch_publications.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add publications.json
          git diff --staged --quiet || git commit -m "Update publications from Google Scholar"
          git push
