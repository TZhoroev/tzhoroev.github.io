name: Update Publications from Semantic Scholar

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: update-publications
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch publications from Semantic Scholar
        run: python scripts/fetch_publications.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add publications.json
          git diff --staged --quiet || git commit -m "Auto-update publication metrics from Semantic Scholar"
          git push
